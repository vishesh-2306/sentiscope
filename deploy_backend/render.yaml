services:
  - type: web
    name: sentiment-api
    runtime: python
    plan: free
    rootDir: deploy_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
